<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, shrink-to-fit=no">
  <title>収納管理アプリ</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#3B82F6">
  <style>
    .modal { display: none; position: fixed; z-index: 50; left: 0; top: 0; width: 100%; height: 100%; overflow: auto; background-color: rgba(0,0,0,0.5); }
    .modal.active { display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col" id="app-root">
  <div id="app" class="container mx-auto p-4 flex-1"></div>

  <div id="qr-modal" class="modal">
    <div class="bg-white rounded-lg shadow-xl p-6 max-w-sm w-full mx-4 relative">
      <button class="absolute top-2 right-3 text-gray-400 hover:text-gray-600 text-2xl leading-none" onclick="closeQrModal()">&times;</button>
      <div id="qr-code-container" class="flex justify-center my-4"></div>
      <p class="text-center text-sm text-gray-600">このQRコードを読み取ると棚を開けます</p>
    </div>
  </div>

  <div id="item-modal" class="modal">
    <div class="bg-white rounded-lg shadow-xl p-6 max-w-lg w-full mx-4 max-h-screen overflow-y-auto">
      <h2 id="item-modal-title" class="text-xl font-bold mb-4">アイテム追加</h2>
      <form id="item-form" autocomplete="off">
        <input type="hidden" id="item-id">
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2" for="item-name">商品名 <span class="text-red-500">*</span></label>
          <input type="text" id="item-name" required class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2" for="item-quantity">個数</label>
          <input type="number" id="item-quantity" min="1" value="1" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2" for="item-expiry">賞味/消費期限</label>
          <input type="date" id="item-expiry" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400">
        </div>
        <div class="mb-4">
          <label class="block text-gray-700 text-sm font-bold mb-2" for="item-notes">備考</label>
          <textarea id="item-notes" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
        </div>
        <div class="flex justify-end space-x-2">
          <button type="button" class="px-4 py-2 bg-gray-200 rounded-md hover:bg-gray-300" onclick="closeItemModal()">キャンセル</button>
          <button type="submit" class="px-4 py-2 bg-blue-500 text-white rounded-md hover:bg-blue-600">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
  <script>
    // ----------------------------------- PWA -----------------------------------
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js');
      });
    }

    // ---------------------------------- Storage (2 keys) ----------------------------------
    const STORAGE_KEY_SHELVES = 'app_storages';
    const STORAGE_KEY_ITEMS   = 'app_items';

    function getShelves() {
      const raw = localStorage.getItem(STORAGE_KEY_SHELVES);
      if (raw) {
        try { return JSON.parse(raw); } catch(e){}
      }
      return [];
    }
    function saveShelves(shelves) {
      localStorage.setItem(STORAGE_KEY_SHELVES, JSON.stringify(shelves));
    }

    function getAllItems() {
      const raw = localStorage.getItem(STORAGE_KEY_ITEMS);
      if (raw) {
        try { return JSON.parse(raw); } catch(e){}
      }
      return {};
    }
    function saveAllItems(itemsObj) {
      localStorage.setItem(STORAGE_KEY_ITEMS, JSON.stringify(itemsObj));
    }

    function getItems(shelfId) {
      const all = getAllItems();
      return all[shelfId] || [];
    }
    function saveItems(shelfId, items) {
      const all = getAllItems();
      all[shelfId] = items;
      saveAllItems(all);
    }

    function removeShelfData(shelfId) {
      const shelves = getShelves().filter(s => s.id !== shelfId);
      saveShelves(shelves);
      const allItems = getAllItems();
      delete allItems[shelfId];
      saveAllItems(allItems);
    }

    function generateId() {
      return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
    }

    // ---------------------------------- JST date ----------------------------------
    function getJSTDate() {
      const jst = new Date(new Date().toLocaleString("en-US", { timeZone: "Asia/Tokyo" }));
      const y = jst.getFullYear();
      const m = String(jst.getMonth() + 1).padStart(2, '0');
      const d = String(jst.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function getDaysDiff(expiryDateStr) {
      if (!expiryDateStr) return null;
      const today = getJSTDate();
      const exp = expiryDateStr;
      const t = new Date(today + 'T00:00:00+09:00');
      const e = new Date(exp + 'T00:00:00+09:00');
      return Math.floor((e - t) / (1000 * 60 * 60 * 24));
    }

    // ---------------------------------- Routing ----------------------------------
    let currentStorageId = null;
    function getStorageIdFromURL() {
      const params = new URLSearchParams(window.location.search);
      return params.get('storage_id') || null;
    }

    function navigateToHome() {
      window.history.replaceState(null, '', window.location.pathname);
      render();
    }

    function navigateToStorage(shelfId) {
      window.history.replaceState(null, '', `?storage_id=${shelfId}`);
      render();
    }

    // ---------------------------------- Rendering ----------------------------------
    function render() {
      const sid = getStorageIdFromURL();
      if (sid) {
        const shelves = getShelves();
        const shelf = shelves.find(s => s.id === sid);
        if (shelf) {
          currentStorageId = sid;
          renderStorageView(shelf);
        } else {
          document.getElementById('app').innerHTML = `<div class="text-center py-10 text-gray-500">棚が見つかりません</div><div class="text-center"><button onclick="navigateToHome()" class="bg-blue-500 text-white px-4 py-2 rounded">ホームへ戻る</button></div>`;
          currentStorageId = null;
        }
      } else {
        currentStorageId = null;
        renderHomeView();
      }
    }

    function renderHomeView() {
      const shelves = getShelves();
      let html = `
        <h1 class="text-2xl font-bold mb-4">📦 収納管理</h1>
        <div class="flex flex-wrap gap-2 mb-6">
          <button onclick="exportData()" class="bg-green-500 text-white px-3 py-2 rounded hover:bg-green-600">JSONエクスポート</button>
          <label class="bg-yellow-500 text-white px-3 py-2 rounded hover:bg-yellow-600 cursor-pointer">
            JSONインポート
            <input type="file" id="import-file" accept=".json" class="hidden" onchange="importData(event)">
          </label>
        </div>
        <div class="bg-white rounded-lg shadow p-4 mb-6">
          <h2 class="text-lg font-semibold mb-3">新しい収納棚を作成</h2>
          <form id="shelf-form" class="flex flex-col sm:flex-row gap-2">
            <input type="text" id="shelf-name" required placeholder="棚の名前" class="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-400">
            <button type="submit" class="bg-blue-500 text-white px-4 py-2 rounded-md hover:bg-blue-600">作成</button>
          </form>
        </div>
      `;
      if (shelves.length === 0) {
        html += `<p class="text-gray-500 text-center py-6">収納棚がありません。新しい棚を作成してください。</p>`;
      } else {
        html += `<div class="grid gap-4 sm:grid-cols-1 md:grid-cols-2">`;
        shelves.forEach(shelf => {
          html += `
            <div class="bg-white rounded-lg shadow p-4 flex items-center justify-between">
              <div class="cursor-pointer flex-1" onclick="navigateToStorage('${shelf.id}')">
                <h3 class="font-bold text-lg">${escapeHtml(shelf.name)}</h3>
                <p class="text-xs text-gray-400">ID: ${shelf.id}</p>
              </div>
              <div class="flex items-center space-x-2 ml-2">
                <button onclick="event.stopPropagation(); showQrModal('${shelf.id}')" class="text-blue-500 hover:text-blue-700 p-1" title="QRコード表示">🔳</button>
                <button onclick="event.stopPropagation(); deleteShelf('${shelf.id}')" class="text-red-500 hover:text-red-700 p-1" title="削除">🗑️</button>
              </div>
            </div>`;
        });
        html += `</div>`;
      }
      document.getElementById('app').innerHTML = html;
      document.getElementById('shelf-form')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('shelf-name').value.trim();
        if (!name) return;
        const shelves = getShelves();
        const newShelf = { id: generateId(), name, createdAt: new Date().toISOString() };
        shelves.push(newShelf);
        saveShelves(shelves);
        render();
      });
    }

    function renderStorageView(shelf) {
      const items = getItems(shelf.id);
      items.sort((a, b) => {
        if (!a.expiryDate && !b.expiryDate) return 0;
        if (!a.expiryDate) return 1;
        if (!b.expiryDate) return -1;
        return a.expiryDate.localeCompare(b.expiryDate);
      });

      let itemsHtml = '';
      if (items.length === 0) {
        itemsHtml = `<p class="text-gray-500 py-4 text-center">アイテムがありません</p>`;
      } else {
        itemsHtml = `<div class="overflow-x-auto"><table class="w-full text-sm text-left"><thead class="text-xs text-gray-700 uppercase bg-gray-50"><tr><th class="px-3 py-2">商品名</th><th class="px-3 py-2">個数</th><th class="px-3 py-2">期限</th><th class="px-3 py-2">備考</th><th class="px-3 py-2"></th></tr></thead><tbody>`;
        items.forEach(item => {
          const diff = getDaysDiff(item.expiryDate);
          let rowClass = '';
          let expiryDisplay = item.expiryDate || '-';
          let badge = '';
          if (item.expiryDate) {
            if (diff !== null) {
              if (diff < 0) {
                rowClass = 'text-red-700 bg-red-100';
                badge = '<span class="ml-2 inline-block bg-red-600 text-white text-xs px-2 py-0.5 rounded">期限切れ</span>';
              } else if (diff <= 3) {
                rowClass = 'text-red-700 bg-red-100';
                badge = `<span class="ml-2 inline-block bg-orange-500 text-white text-xs px-2 py-0.5 rounded">残り${diff}日</span>`;
              }
            }
          }
          itemsHtml += `<tr class="border-b ${rowClass}">
            <td class="px-3 py-2 font-medium">${escapeHtml(item.name)}${badge}</td>
            <td class="px-3 py-2">${item.quantity}</td>
            <td class="px-3 py-2">${expiryDisplay}</td>
            <td class="px-3 py-2 max-w-xs truncate" title="${escapeHtml(item.notes || '')}">${escapeHtml(item.notes || '')}</td>
            <td class="px-3 py-2 text-right space-x-1">
              <button onclick="editItem('${item.id}')" class="text-blue-500 hover:text-blue-700 text-xs">編集</button>
              <button onclick="deleteItem('${item.id}')" class="text-red-500 hover:text-red-700 text-xs">削除</button>
            </td>
          </tr>`;
        });
        itemsHtml += `</tbody></table></div>`;
      }

      const html = `
        <div class="flex items-center mb-4">
          <button onclick="navigateToHome()" class="mr-3 text-blue-500 hover:text-blue-700 text-lg">← 戻る</button>
          <h1 class="text-2xl font-bold flex-1">${escapeHtml(shelf.name)}</h1>
          <button onclick="showAddItemModal()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">＋ アイテム追加</button>
        </div>
        ${itemsHtml}
      `;
      document.getElementById('app').innerHTML = html;
      window.__currentShelf = shelf;
    }

    function escapeHtml(text) {
      return text.replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      });
    }

    // ---------------------------------- Shelf CRUD ----------------------------------
    function deleteShelf(id) {
      if (!confirm('この棚と中身をすべて削除しますか？')) return;
      removeShelfData(id);
      render();
    }

    function showQrModal(shelfId) {
      const modal = document.getElementById('qr-modal');
      const container = document.getElementById('qr-code-container');
      container.innerHTML = '';
      const url = window.location.origin + window.location.pathname + '?storage_id=' + shelfId;
      new QRCode(container, {
        text: url,
        width: 200,
        height: 200,
        colorDark : "#000000",
        colorLight : "#ffffff",
        correctLevel : QRCode.CorrectLevel.H
      });
      modal.classList.add('active');
    }
    function closeQrModal() {
      document.getElementById('qr-modal').classList.remove('active');
      document.getElementById('qr-code-container').innerHTML = '';
    }

    // ---------------------------------- Items CRUD ----------------------------------
    function showAddItemModal() {
      document.getElementById('item-modal-title').textContent = 'アイテム追加';
      document.getElementById('item-id').value = '';
      document.getElementById('item-name').value = '';
      document.getElementById('item-quantity').value = 1;
      document.getElementById('item-expiry').value = '';
      document.getElementById('item-notes').value = '';
      document.getElementById('item-modal').classList.add('active');
    }
    function editItem(itemId) {
      const shelf = window.__currentShelf;
      if (!shelf) return;
      const items = getItems(shelf.id);
      const item = items.find(i => i.id === itemId);
      if (!item) return;
      document.getElementById('item-modal-title').textContent = 'アイテム編集';
      document.getElementById('item-id').value = item.id;
      document.getElementById('item-name').value = item.name;
      document.getElementById('item-quantity').value = item.quantity;
      document.getElementById('item-expiry').value = item.expiryDate || '';
      document.getElementById('item-notes').value = item.notes || '';
      document.getElementById('item-modal').classList.add('active');
    }
    function closeItemModal() {
      document.getElementById('item-modal').classList.remove('active');
    }
    function deleteItem(itemId) {
      if (!confirm('このアイテムを削除しますか？')) return;
      const shelf = window.__currentShelf;
      if (!shelf) return;
      const items = getItems(shelf.id).filter(i => i.id !== itemId);
      saveItems(shelf.id, items);
      render();
    }

    document.getElementById('item-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const shelf = window.__currentShelf;
      if (!shelf) return;
      const id = document.getElementById('item-id').value;
      const name = document.getElementById('item-name').value.trim();
      if (!name) return alert('商品名は必須です');
      const quantity = parseInt(document.getElementById('item-quantity').value, 10) || 1;
      const expiryDate = document.getElementById('item-expiry').value;
      const notes = document.getElementById('item-notes').value.trim();
      const items = getItems(shelf.id);
      if (id) {
        const idx = items.findIndex(i => i.id === id);
        if (idx > -1) {
          items[idx] = { ...items[idx], name, quantity, expiryDate, notes };
        }
      } else {
        const newItem = { id: generateId(), name, quantity, expiryDate, notes };
        items.push(newItem);
      }
      saveItems(shelf.id, items);
      closeItemModal();
      render();
    });

    // ---------------------------------- Export / Import ----------------------------------
    function exportData() {
      const data = {
        storages: getShelves(),
        items: getAllItems()
      };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'storage_backup.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const data = JSON.parse(e.target.result);
          if (!data.storages || !data.items) throw new Error('Invalid format');
          if (!confirm('インポートすると現在のデータは上書きされます。よろしいですか？')) return;
          saveShelves(data.storages);
          saveAllItems(data.items);
          alert('データをインポートしました。');
          render();
        } catch (err) {
          alert('ファイル形式が正しくありません。');
        }
        event.target.value = '';
      };
      reader.readAsText(file);
    }

    // ---------------------------------- Init ----------------------------------
    window.addEventListener('popstate', render);
    document.addEventListener('click', (e) => {
      if (e.target === document.getElementById('qr-modal')) closeQrModal();
      if (e.target === document.getElementById('item-modal')) closeItemModal();
    });
    render();
  </script>
</body>
</html>
